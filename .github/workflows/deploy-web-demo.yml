name: Deploy Web Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EASYLIFE_API_BASE_URL: ${{ secrets.EASYLIFE_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify public backend configuration
        run: |
          if [ -z "$EASYLIFE_API_BASE_URL" ]; then
            echo "EASYLIFE_API_BASE_URL GitHub secret is required for the public demo to call the Easylife backend." >&2
            exit 1
          fi

      - name: Build public demo
        run: |
          flutter build web --release \
            --dart-define=EASYLIFE_DEMO_MODE=true \
            --dart-define=EASYLIFE_API_BASE_URL=$EASYLIFE_API_BASE_URL \
            --base-href=/${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
