name: Deploy Web Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EASYLIFE_API_BASE_URL: ${{ secrets.EASYLIFE_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify public backend configuration
        run: |
          if [ -z "$EASYLIFE_API_BASE_URL" ]; then
            echo "EASYLIFE_API_BASE_URL GitHub secret is required for the public demo to call the Easylife backend." >&2
            exit 1
          fi

      - name: Build public demo
        run: |
          flutter build web --release \
            --dart-define=EASYLIFE_DEMO_MODE=true \
            --dart-define=EASYLIFE_API_BASE_URL=$EASYLIFE_API_BASE_URL \
            --base-href=/${{ github.event.repository.name }}/

      - name: Add web asset cache busting
        run: |
          build_id="${GITHUB_SHA::12}"
          main_hash="$(sha256sum build/web/main.dart.js | cut -c 1-12)"
          main_file="main.${main_hash}.dart.js"
          mv build/web/main.dart.js "build/web/${main_file}"
          perl -0pi -e "s/\"mainJsPath\":\"main\\.dart\\.js\"/\"mainJsPath\":\"${main_file}\"/g" build/web/flutter_bootstrap.js
          perl -0pi -e "s/src=\"flutter_bootstrap\\.js\"/src=\"flutter_bootstrap.js?v=${build_id}\"/g" build/web/index.html

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          touch build/web/.nojekyll
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --force build/web
          git commit -m "Deploy web demo artifact" || true
          git subtree split --prefix build/web -b gh-pages-deploy
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages-deploy:gh-pages
