        mutationId:
          type: string
          format: uuid
        entityId:
          type: string
          format: uuid
        operation:
          type: string
          const: upsert
        baseVersion:
          type: integer
          minimum: 0
          description: 新实体使用 0，更新实体使用客户端最后确认的服务端版本。
        clientUpdatedAt:
          type: string
          format: date-time
          description: 仅用于展示和诊断，不作为冲突胜负依据。
    UserProfileUpsertMutation:
      allOf:
        - $ref: "#/components/schemas/SyncUpsertMutationBase"
