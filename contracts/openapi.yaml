      unevaluatedProperties: false
    SyncUpsertMutation:
      oneOf:
        - $ref: "#/components/schemas/UserProfileUpsertMutation"
        - $ref: "#/components/schemas/PetProfileUpsertMutation"
        - $ref: "#/components/schemas/EmotionEntryUpsertMutation"
        - $ref: "#/components/schemas/MemoryNoteUpsertMutation"
      discriminator:
        propertyName: entityType
        mapping:
          userProfile: "#/components/schemas/UserProfileUpsertMutation"
          petProfile: "#/components/schemas/PetProfileUpsertMutation"
          emotionEntry: "#/components/schemas/EmotionEntryUpsertMutation"
          memoryNote: "#/components/schemas/MemoryNoteUpsertMutation"
    SyncDeleteMutation:
      type: object
      additionalProperties: false
      required:
        - mutationId
        - entityType
        - entityId
        - operation
        - baseVersion
        - clientUpdatedAt
      properties:
        mutationId:
          type: string
          format: uuid
        entityType:
          $ref: "#/components/schemas/DeletableEntityType"
        entityId:
          type: string
          format: uuid
        operation:
          type: string
          const: delete
        baseVersion:
          type: integer
          minimum: 1
        clientUpdatedAt:
          type: string
          format: date-time
    SyncMutation:
      oneOf:
        - $ref: "#/components/schemas/SyncUpsertMutation"
        - $ref: "#/components/schemas/SyncDeleteMutation"
      discriminator:
        propertyName: operation
        mapping:
          upsert: "#/components/schemas/SyncUpsertMutation"
          delete: "#/components/schemas/SyncDeleteMutation"
    SyncPushRequest:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - mutations
      properties:
        deviceId:
          $ref: "#/components/schemas/DeviceId"
        mutations:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/SyncMutation"
    SyncMutationResult:
      type: object
      additionalProperties: false
      required:
        - mutationId
        - entityType
        - entityId
        - status
        - entity
        - error
      properties:
        mutationId:
          type: string
          format: uuid
        entityType:
          $ref: "#/components/schemas/EntityType"
        entityId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - applied
            - duplicate
            - conflict
            - rejected
        entity:
          oneOf:
            - $ref: "#/components/schemas/SyncEntity"
            - type: "null"
          description: applied、duplicate 或 conflict 时返回服务端当前实体。
        error:
          oneOf:
            - $ref: "#/components/schemas/SyncMutationError"
            - type: "null"
    SyncMutationError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - VERSION_CONFLICT
            - ENTITY_NOT_FOUND
            - ENTITY_VALIDATION_ERROR
            - ENTITY_TYPE_MISMATCH
        message:
          type: string
          minLength: 1
          maxLength: 300
    SyncPushResponse:
      type: object
      additionalProperties: false
      required:
        - results
        - serverTime
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SyncMutationResult"
        serverTime:
          type: string
          format: date-time
    SyncPullResponse:
      type: object
      additionalProperties: false
      required:
        - changes
        - nextCursor
        - hasMore
        - serverTime
      properties:
        changes:
          type: array
          items:
            $ref: "#/components/schemas/SyncEntity"
        nextCursor:
          type: string
          minLength: 1
          maxLength: 500
        hasMore:
          type: boolean
        serverTime:
          type: string
          format: date-time
    DeleteAccountRequest:
