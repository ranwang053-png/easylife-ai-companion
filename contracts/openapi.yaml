      properties:
        role:
          type: string
          enum:
            - user
            - companion
        text:
          type: string
          minLength: 1
          maxLength: 2000
        occurredAt:
          type: string
          format: date-time
    CompanionReplyRequest:
      type: object
      additionalProperties: false
      required:
        - conversation
        - context
        - client
      properties:
        conversation:
          type: array
          minItems: 1
          maxItems: 30
          items:
            $ref: "#/components/schemas/ConversationTurn"
          description: 仅包含当前本轮对话，不传历史日记全文。
        context:
          $ref: "#/components/schemas/EmotionContext"
        client:
          $ref: "#/components/schemas/ClientContext"
    CompanionReplyResponse:
      type: object
      additionalProperties: false
      required:
        - reply
        - emotionLabel
        - riskLevel
        - serviceSuggestion
      properties:
        reply:
          type: string
          minLength: 1
          maxLength: 220
          description: 前端直接展示给用户的伙伴回复。
        emotionLabel:
          type:
            - string
            - "null"
          maxLength: 40
          description: 可选的自然情绪命名，用于状态和保存流程，不直接作为报告展示。
        riskLevel:
          type: string
          enum:
            - none
            - concern
            - crisis
        serviceSuggestion:
          type:
            - string
            - "null"
          enum:
            - breathing
            - emotion_card
            - save_journal
            - self_care
            - null
    EmotionJournalSummaryRequest:
      type: object
      additionalProperties: false
      required:
        - conversation
        - context
        - client
      properties:
        conversation:
          type: array
          minItems: 1
          maxItems: 40
          items:
            $ref: "#/components/schemas/ConversationTurn"
          description: 用户主动保存时的完整本轮对话。
        context:
          $ref: "#/components/schemas/EmotionContext"
        client:
          $ref: "#/components/schemas/ClientContext"
    EmotionJournalSummaryResponse:
      type: object
      additionalProperties: false
      required:
        - recap
        - emotionTags
        - trigger
        - insight
        - nextActions
        - closingWords
      properties:
        recap:
          type: string
          minLength: 1
          maxLength: 160
        emotionTags:
          type: array
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 30
        trigger:
          type: string
          minLength: 1
          maxLength: 160
        insight:
          type: string
          minLength: 1
          maxLength: 240
        nextActions:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
            minLength: 1
            maxLength: 80
        closingWords:
          type: string
          minLength: 1
          maxLength: 60
    MemoryExtractRequest:
      type: object
      additionalProperties: false
      required:
        - sourceType
        - sourceContent
        - existingMemories
        - client
      properties:
        sourceType:
          type: string
          enum:
            - emotion_journal
            - diet_record
            - user_profile
        sourceContent:
          type: object
          additionalProperties: true
          description: 已经由用户确认保存的结构化内容，不传手机号、验证码或完整未确认对话。
        existingMemories:
          type: array
          maxItems: 24
          items:
            type: string
            minLength: 1
            maxLength: 500
        client:
          $ref: "#/components/schemas/ClientContext"
    MemoryCandidate:
      type: object
      additionalProperties: false
      required:
        - type
        - content
        - usage
      properties:
        type:
          type: string
          enum:
            - emotional_sensitivity
            - coping_strategy
            - current_focus
            - communication_preference
            - lifestyle_habit
            - health_context
            - work_study_context
            - boundary
        content:
          type: string
          minLength: 1
          maxLength: 80
        usage:
          type: string
          enum:
            - companion
            - diet
            - fortune
            - profile
    MemoryExtractResponse:
      type: object
      additionalProperties: false
      required:
        - memoryCandidates
      properties:
        memoryCandidates:
          type: array
          maxItems: 3
          items:
            $ref: "#/components/schemas/MemoryCandidate"
    PetAvatarGenerateRequest:
      type: object
      additionalProperties: false
      required:
        - imageDataUrl
        - client
      properties:
        imageDataUrl:
          type: string
          minLength: 32
          maxLength: 8388608
          pattern: '^data:image/(png|jpeg|jpg|webp);base64,'
          description: 用户授权上传的伙伴照片 data URL。仅允许 PNG、JPEG 或 WebP。
        subjectDescription:
          type: string
          maxLength: 300
          description: 用户可选补充的主体描述；不得包含账号、手机号或身份凭证。
          example: 白色小猫，眼睛圆圆的，性格安静。
        client:
          $ref: "#/components/schemas/ClientContext"
    PetAvatarGenerateResponse:
      type: object
      additionalProperties: false
      required:
        - generatedAvatarUrl
      properties:
        generatedAvatarUrl:
          type: string
          minLength: 1
          maxLength: 8388608
          pattern: '^data:image/(png|jpeg|jpg|webp);base64,|^https://'
          description: 生成后的伙伴形象。Demo 可返回 data URL；生产推荐返回对象存储 HTTPS URL。
    EmotionContext:
      type: object
      additionalProperties: false
      description: |
        情绪分析所需的最小化个性化上下文。不得包含账号、邮箱、完整生日、出生地、
        当前住址、体重或饮食限制。
      required:
        - nickname
        - goals
        - personalTags
        - memoryNotes
        - petReminderStyle
      properties:
        nickname:
          type: string
          maxLength: 50
          description: 用户昵称；允许为空字符串。
          example: 小满
        goals:
          type: array
          maxItems: 10
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 50
          example:
            - 规律作息
        personalTags:
          type: array
          maxItems: 20
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 50
          example:
            - 工作压力较高
        memoryNotes:
          type: array
          maxItems: 12
          description: 用户确认保留的近期提炼记忆，不发送全部逐字聊天记录。
          items:
            type: string
            minLength: 1
            maxLength: 500
          example:
            - 疲惫、压力：连续加班后很累
        petReminderStyle:
          type: string
          maxLength: 50
          description: 用户选择的陪伴和提醒语气。
          example: 轻提醒
        companion:
          $ref: "#/components/schemas/CompanionContext"
    CompanionContext:
      type: object
      additionalProperties: false
      description: |
        用于调整伙伴回复语气的低敏伙伴档案上下文。不得包含照片、生日、生成图片 URL
        或其他不影响回复口吻的资料。
      required:
        - name
        - personalityTags
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: 一团
        personalityTags:
          type: array
          maxItems: 8
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 30
          example:
            - 安静
            - 贴心
        relationshipNote:
          type: string
          maxLength: 120
          description: 用户描述的关系或称呼。
          example: 我的陪伴伙伴
        personalitySummary:
          type: string
          maxLength: 200
          description: 伙伴性格摘要，用于轻微调整回复口吻。
          example: 安静地陪在身边，会在你忙过头时轻轻提醒休息。
    ClientContext:
      type: object
      additionalProperties: false
      required:
        - platform
        - appVersion
        - locale
      properties:
        platform:
          type: string
          enum:
            - ios
            - android
            - web
          example: ios
        appVersion:
          type: string
          pattern: '^[0-9]+\.[0-9]+\.[0-9]+(?:\+[0-9]+)?$'
          example: 0.3.0+3
        locale:
          type: string
          pattern: '^[a-z]{2}(?:-[A-Z]{2})?$'
          example: zh-CN
    EmotionAnalyzeResponse:
      type: object
      additionalProperties: false
      required:
        - label
        - labels
        - intensity
        - possibleReason
        - petSuggestion
        - petReply
        - petStatus
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 30
          description: 主情绪标签，必须与 labels 的第一项一致。
          example: 疲惫
        labels:
          type: array
          minItems: 1
          maxItems: 4
          uniqueItems: true
          description: 主标签和辅助标签；第一项必须等于 label。
          items:
            type: string
            minLength: 1
            maxLength: 30
          example:
            - 疲惫
            - 压力
            - 需要休息
        intensity:
          type: integer
          minimum: 0
          maximum: 100
          description: 当前情绪强度，不代表医学评估结果。
          example: 72
        possibleReason:
          type: string
          minLength: 1
          maxLength: 1000
          description: 以不确定性语言表达的可能原因，不得给出医学诊断。
          example: 持续处理任务可能造成注意力耗竭。
        petSuggestion:
          type: string
          minLength: 1
          maxLength: 1000
          description: 温和、具体、低风险且可执行的建议。
          example: 先缩减今晚必须完成的任务，给自己留出十分钟休息。
        petReply:
          type: string
          minLength: 1
          maxLength: 2000
          description: 伙伴向用户展示的陪伴回复。
          example: 听起来你已经撑了很久，我们先慢一点。
        petStatus:
          type: string
          minLength: 1
          maxLength: 30
          description: 当前伙伴展示状态。
          example: 陪伴中
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: object
