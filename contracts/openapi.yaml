      properties:
        deletionRequestId:
          type: string
          format: uuid
        status:
          type: string
          const: pending
        requestedAt:
          type: string
          format: date-time
    EmotionAnalyzeRequest:
      type: object
      additionalProperties: false
      required:
        - text
        - context
        - client
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 4000
          description: |
            用户本轮输入。多轮对话可由客户端按时间顺序拼接，但不得包含未获授权的
            其他会话或后台采集内容。
          example: 今天工作很多，我有点累，也担心做得不够好。
        context:
          $ref: "#/components/schemas/EmotionContext"
        client:
          $ref: "#/components/schemas/ClientContext"
    ConversationTurn:
      type: object
      additionalProperties: false
      required:
        - role
