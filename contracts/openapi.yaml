          required:
            - entityType
            - payload
          properties:
            entityType:
              type: string
              const: userProfile
            payload:
              $ref: "#/components/schemas/UserProfilePayload"
      unevaluatedProperties: false
    PetProfileUpsertMutation:
      allOf:
        - $ref: "#/components/schemas/SyncUpsertMutationBase"
        - type: object
          required:
            - entityType
            - payload
          properties:
            entityType:
              type: string
              const: petProfile
            payload:
              $ref: "#/components/schemas/PetProfilePayload"
      unevaluatedProperties: false
    EmotionEntryUpsertMutation:
