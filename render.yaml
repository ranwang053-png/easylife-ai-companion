envVarGroups:
  - name: easylife-api-shared
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: TRUST_PROXY
        value: true
      - key: ALLOWED_ORIGINS
        value: https://ranwang053-png.github.io
      - key: ENABLE_TEST_TRIGGERS
        value: false
      - key: PORTFOLIO_DEMO_ACCESS_TOKEN
        value: example-access-token-with-at-least-twenty-characters
      - key: SMS_PROVIDER_MAX_ATTEMPTS
        value: 3
      - key: AI_PROVIDER
        value: gateway
      - key: AI_COMPANION_PROVIDER
        value: openai
      - key: AI_COMPANION_MODEL
        value: gpt-5.5
      - key: AI_EMOTION_PROVIDER
        value: anthropic
      - key: AI_EMOTION_MODEL
        value: claude-sonnet-4.6
      - key: AI_EMOTION_JOURNAL_PROVIDER
        value: anthropic
      - key: AI_EMOTION_JOURNAL_MODEL
        value: claude-sonnet-4.6
      - key: AI_MEMORY_PROVIDER
        value: anthropic
      - key: AI_MEMORY_MODEL
        value: claude-sonnet-4.6
      - key: AI_PET_PROFILE_PROVIDER
        value: anthropic
      - key: AI_PET_PROFILE_MODEL
        value: claude-sonnet-4.6
      - key: AI_DAILY_FORTUNE_PROVIDER
        value: openai
      - key: AI_DAILY_FORTUNE_MODEL
        value: gpt-5.5
      - key: AI_PET_AVATAR_PROVIDER
        value: openai
      - key: AI_PET_AVATAR_MODEL
        value: gpt-image-1
      - key: AI_DIET_TEXT_PROVIDER
        value: doubao
      - key: AI_DIET_TEXT_MODEL
        value: doubao-seed-1-6
      - key: AI_DIET_VISION_PROVIDER
        value: doubao
      - key: AI_DIET_VISION_MODEL
        value: doubao-seed-1-6
      - key: AI_DIET_SEARCH_PROVIDER
        value: doubao
      - key: AI_DIET_SEARCH_MODEL
        value: doubao-seed-1-6
      - key: AI_FOOD_SEGMENTATION_PROVIDER
        value: birefnet
      - key: AI_FOOD_SEGMENTATION_MODEL
        value: BiRefNet
      - key: AI_FOOD_IMAGE_ENHANCEMENT
        value: light
      - key: OPENAI_BASE_URL
        value: https://aihubmix.com
      - key: ANTHROPIC_BASE_URL
        value: https://api.anthropic.com
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: AI_PET_AVATAR_BASE_URL
        value: https://api.openai.com/v1
      - key: ACCESS_TOKEN_KEY_ID
        value: current
      - key: ACCESS_TOKEN_PREVIOUS_KEYS
        value: "{}"
      - key: ACCESS_TOKEN_ISSUER
        value: easylife-api
      - key: ACCESS_TOKEN_AUDIENCE
        value: easylife-ios
      - key: ACCOUNT_DELETION_ALLOW_DATABASE_ONLY
        value: true
      - key: ACCOUNT_DELETION_LEASE_SECONDS
        value: 300
      - key: ACCOUNT_DELETION_POLL_SECONDS
        value: 5
      - key: ACCOUNT_DELETION_MAX_BACKOFF_SECONDS
        value: 3600
      - key: AUTH_MAINTENANCE_INTERVAL_SECONDS
        value: 3600
      - key: LOG_HTTP_BODIES
        value: false
      - key: PHONE_LOOKUP_PEPPER
        generateValue: true
      - key: PHONE_ENCRYPTION_KEY
        generateValue: true
      - key: SMS_CODE_PEPPER
        generateValue: true
      - key: DEVICE_PEPPER
        generateValue: true
      - key: IP_PEPPER
        generateValue: true
      - key: REFRESH_TOKEN_PEPPER
        generateValue: true
      - key: DELETION_TOKEN_PEPPER
        generateValue: true
      - key: ACCESS_TOKEN_KEY
        generateValue: true

services:
  - type: web
    name: easylife-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend/server
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run migrate:prod && npm start
    healthCheckPath: /v1/health
    autoDeployTrigger: commit
    envVars:
      - fromGroup: easylife-api-shared
      - key: DATABASE_URL
        fromDatabase:
          name: easylife-postgres
          property: connectionString
      - key: SMS_PROVIDER_URL
        sync: false
      - key: SMS_PROVIDER_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DOUBAO_API_KEY
        sync: false
      - key: BIREFNET_API_KEY
        sync: false
      - key: AI_PET_AVATAR_API_KEY
        sync: false
      - key: DOUBAO_BASE_URL
        sync: false
      - key: BIREFNET_BASE_URL
        sync: false

databases:
  - name: easylife-postgres
    databaseName: easylife
    user: easylife
    plan: free
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []
